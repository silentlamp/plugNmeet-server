name: Deploy ZenLeader Meet Server

# Build silentlamp/zenleader-meet-server image and roll it out on the VPS.
# Trigger: push to zenleader/dev or manual dispatch.
# Docker Hub image remains: */plugnmeet-server:zenleader (stack path /opt/plugNmeet).

on:
  push:
    branches: ["zenleader/dev"]
  workflow_dispatch:

concurrency:
  group: deploy-zenleader-meet-server
  cancel-in-progress: false

env:
  IMAGE_NAME: plugnmeet-server
  IMAGE_TAG: zenleader

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push fork image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker-build/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll out on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          PLUGNMEET_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-server:zenleader
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,PLUGNMEET_IMAGE
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="/home/dev/zen-leader"
            fi
            # Avoid `sudo -E` (blocked on VPS). Export env for the deploy user.
            export DOCKERHUB_USERNAME DOCKERHUB_TOKEN PLUGNMEET_IMAGE
            if [ -x "$DEPLOY_PATH/scripts/ci-deploy-plugnmeet.sh" ]; then
              bash "$DEPLOY_PATH/scripts/ci-deploy-plugnmeet.sh"
            else
              echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
              cd /opt/plugNmeet
              docker pull "$PLUGNMEET_IMAGE"
              if [ -w docker-compose.yaml ]; then
                tmp="$(mktemp)"
                sed -E "s|image:.*plugnmeet-server.*|image: ${PLUGNMEET_IMAGE}|g" docker-compose.yaml >"$tmp"
                cat "$tmp" >docker-compose.yaml
                rm -f "$tmp"
              else
                echo "ERROR: docker-compose.yaml not writable by deploy user" >&2
                exit 1
              fi
              docker compose up -d --no-deps --force-recreate plugnmeet
              curl -fsS http://127.0.0.1:8082/healthCheck
            fi
